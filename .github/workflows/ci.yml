name: ci

on:
  push:
  pull_request:

jobs:
  backend:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Scope freeze docs guardrail
        run: |
          grep -nE "^## Perimetre d'audit \\(gele\\)" README.md
          grep -nE "^### Out-of-scope / Non-goals" README.md
          grep -nE "^## Cas d'usage critiques" README.md
      - name: Canonical docs guardrail
        run: |
          test -f docs/CONVENTIONS.md
          test -f docs/invariants.md
          test -f docs/system-boundaries.md
          test -f docs/INDEX.md
          test -f docs/CONTEXT.md
          test -f docs/DECISIONS.md
          test -f docs/GLOSSARY.md
          test -f docs/CONTEXT.compact.md
          grep -n "docs/CONVENTIONS.md" README.md
          grep -n "docs/invariants.md" README.md
          grep -n "docs/system-boundaries.md" README.md
      - name: Scope change alignment guardrail
        run: |
          # If scope-critical docs are modified, verify companion docs are also touched.
          # This prevents partial updates that break the documented perimeter.
          CHANGED=$(git diff --name-only ${{ github.event.pull_request.base.sha || 'HEAD~1' }} 2>/dev/null || echo "")
          if [ -z "$CHANGED" ]; then
            echo "No diff available (push on main or shallow clone); skipping alignment check."
            exit 0
          fi
          echo "Changed files:"
          echo "$CHANGED"
          # If README scope sections or invariants change, require system-boundaries and ENV_POLICY updates too
          SCOPE_CHANGED=false
          echo "$CHANGED" | grep -qE "^README\\.md$" && SCOPE_CHANGED=true
          echo "$CHANGED" | grep -qE "^docs/invariants\\.md$" && SCOPE_CHANGED=true
          echo "$CHANGED" | grep -qE "^docs/system-boundaries\\.md$" && SCOPE_CHANGED=true
          if [ "$SCOPE_CHANGED" = "true" ]; then
            echo "Scope-critical file changed — verifying companion docs alignment:"
            echo "$CHANGED" | grep -qE "^(README\\.md|docs/invariants\\.md|docs/system-boundaries\\.md|docs/ENV_POLICY\\.md|docs/CONVENTIONS\\.md)$" && echo "OK: at least one companion scope doc updated" || { echo "FAIL: scope-critical file changed without updating companion docs (invariants, system-boundaries, ENV_POLICY, or CONVENTIONS). Update all related docs together."; exit 1; }
          else
            echo "No scope-critical files changed; alignment check passed."
          fi
      - name: AUDIT_STATUS guardrail
        run: |
          test -f docs/AUDIT_STATUS.md
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip
      - name: Install deps
        run: |
          python -m pip install -U pip
          pip install -r requirements.txt
          pip install -r requirements-dev.txt
      - name: Security baseline guardrails (prod profile)
        run: |
          chmod +x scripts/check-security-baseline.sh
          VOCALIE_API_KEY="ci_prod_security_baseline_key_1234567890" \
          VOCALIE_TRUST_LOCALHOST="0" \
          VOCALIE_ENABLE_API_DOCS="0" \
          VOCALIE_ALLOWED_HOSTS="api.example.com" \
          VOCALIE_TRUSTED_PROXIES="127.0.0.1" \
          VOCALIE_MAX_UPLOAD_BYTES="26214400" \
          bash scripts/check-security-baseline.sh --prod
      - name: Security baseline catches insecure config
        run: |
          chmod +x scripts/check-security-baseline.sh
          if VOCALIE_API_KEY="change-me" \
             VOCALIE_TRUST_LOCALHOST="1" \
             VOCALIE_ENABLE_API_DOCS="1" \
             VOCALIE_ALLOWED_HOSTS="*" \
             VOCALIE_TRUSTED_PROXIES="*" \
             VOCALIE_MAX_UPLOAD_BYTES="0" \
             bash scripts/check-security-baseline.sh --prod; then
            echo "Expected security baseline check to fail for insecure configuration."
            exit 1
          fi
      - name: Pytest
        run: pytest -q
      - name: Rate-limit fairness simulation
        run: python scripts/check-rate-limit-fairness.py
      - name: Python lint (minimal, blocking)
        run: ruff check backend scripts tests tts_pipeline.py text_tools.py audio_defaults.py output_paths.py refs.py session_manager.py

  frontend:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: frontend
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm
          cache-dependency-path: frontend/package-lock.json
      - name: Install deps (lockfile strict)
        run: npm ci --include=optional --prefer-offline --no-audit --progress=false
      - name: Lint
        run: npm run lint
      - name: Debug hygiene guardrail
        run: |
          ! grep -R -nE "console\\.(debug|log)" src/app/page.tsx src/lib/api.ts
      - name: Check lockfile is cross-platform (Linux native deps)
        if: runner.os == 'Linux'
        run: |
          node - <<'NODE'
          const checks = [
            { name: "lightningcss", requireId: "lightningcss" },
            { name: "@tailwindcss/oxide", requireId: "@tailwindcss/oxide" },
            { name: "@tailwindcss/oxide-linux-x64-gnu", requireResolve: "@tailwindcss/oxide-linux-x64-gnu" },
          ];

          const failures = [];
          for (const check of checks) {
            try {
              if (check.requireId) require(check.requireId);
              if (check.requireResolve) require.resolve(check.requireResolve);
            } catch (err) {
              failures.push({ check: check.name, error: String(err && err.message ? err.message : err) });
            }
          }

          if (failures.length) {
            console.error("❌ package-lock.json is platform-specific (likely generated on macOS).");
            console.error("This CI is intentionally strict: it runs `npm ci` only and will not auto-repair native deps.");
            console.error("Missing Linux native dependencies detected after `npm ci`:");
            for (const f of failures) console.error(`- ${f.check}: ${f.error}`);
            console.error("");
            console.error("Fix: regenerate `frontend/package-lock.json` from a Linux environment (Docker is fine), then commit it.");
            console.error("Hint: run from repo root: `bash ./scripts/gen-lock-linux.sh` (runs Linux Docker + validates `npm ci && npm run build`).");
            process.exit(1);
          }
          console.log("✅ Lockfile looks cross-platform for Linux native deps.");
          NODE
      - name: Build
        run: npm run build
        env:
          NEXT_DISABLE_TURBOPACK: "1"
          NEXT_TELEMETRY_DISABLED: "1"
          TURBOPACK: "0"
